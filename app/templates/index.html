{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h2 class="mb-0">Keluarga Embah Yasin</h2>
  <div>
    <input id="search-box" class="form-control d-inline-block" style="width: 300px;"
           type="search" placeholder="Cari nama ahli keluarga...">
  </div>
</div>

<div id="login-prompt" class="alert alert-info" style="display:none;">
  Sila <a href="/login">log masuk dengan akaun Google</a> untuk melihat data keluarga.
</div>

<!-- Search results (shown only while searching) -->
<div id="search-results" class="row g-3 mb-4" style="display:none;"></div>

<!-- Everything below is hidden while a search is active -->
<div id="home-content">

  <!-- Statistics scorecard (placeholder — populated in a later step) -->
  <div id="stats-scorecard" class="row g-3 mb-4" style="display:none;"></div>

  <!-- Founder + immediate family -->
  <div id="founder-section" class="mb-4"></div>

  <!-- Full household list, behind a toggle -->
  <div class="d-flex align-items-center gap-2 mb-2">
    <h4 class="mb-0">Semua Keluarga</h4>
    <button id="toggle-households" class="btn btn-sm btn-outline-secondary">
      Lihat semua keluarga
    </button>
  </div>
  <div id="households-list" class="row g-3" style="display:none;"></div>

</div>
{% endblock %}

{% block scripts %}
<script type="module" src="/static/index.js"></script>
{% endblock %}

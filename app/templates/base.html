<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Keluarga Embah Yasin{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f8f9fa; }
    .navbar-brand { font-weight: 600; }
    .audit-entry { font-size: 0.875rem; color: #6c757d; }
    .person-card { transition: transform 0.1s; }
    .person-card:hover { transform: translateY(-2px); }
    .role-badge { font-size: 0.75rem; }
    .claimed-badge { color: #198754; }
  </style>
  {% block head_extra %}{% endblock %}
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="/">🌳 Keluarga Embah Yasin</a>
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link" href="/">Senarai Keluarga</a></li>
      </ul>
      <div id="user-nav" class="d-flex align-items-center text-white"></div>
    </div>
  </nav>

  <main class="container py-4">
    {% block content %}{% endblock %}
  </main>

  <!-- Firebase config (public values, safe to expose) -->
  <script>
    window.FIREBASE_CONFIG = {{ firebase_config | tojson }};
  </script>

  <!-- Bootstrap JS bundle (includes Popper) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- Firebase JS SDK (modular v10) -->
<script type="module" src="/static/auth.js"></script>

  <!-- Firebase JS SDK (modular v10) -->
  <script type="module" src="/static/auth.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
